name: Full Deploy (Laravel + React)

# Repository secrets: SSH_PRIVATE_KEY, DEPLOY_HOST, DEPLOY_PORT, DEPLOY_USER, DEPLOY_PATH
# Use an absolute DEPLOY_PATH on the server (tilde paths can fail when quoted).

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.composer-cache.outputs.dir }}
            vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist --no-dev --optimize-autoloader

      - name: Prepare application environment for build
        run: |
          cp .env.example .env
          php artisan key:generate --force

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${DEPLOY_PORT}" "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache Vite build
        uses: actions/cache@v4
        with:
          path: |
            node_modules/.vite
            public/build
          key: ${{ runner.os }}-vite-${{ hashFiles('package-lock.json', 'vite.config.ts', 'resources/js/**', 'resources/css/**') }}
          restore-keys: |
            ${{ runner.os }}-vite-

      - name: Build frontend
        run: |
          npm ci
          npm run build

      - name: Upload build to server
        run: |
          rsync -avz --delete -e "ssh -i ~/.ssh/id_ed25519 -p ${DEPLOY_PORT}" public/build/ \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/public/build/"

      - name: Deploy backend
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" bash -s <<REMOTE
          set -euo pipefail
          cd "${DEPLOY_PATH}"

          git pull origin main

          composer install --no-dev --no-interaction --no-progress --optimize-autoloader

          php artisan storage:link || true
          php artisan optimize:clear
          php artisan migrate --force

          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          php artisan queue:restart
          REMOTE
